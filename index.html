<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقني لخدمات السيارات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #111;
            color: white;
            text-align: center;
        }

        header {
            background: #0066ff;
            padding: 30px;
        }

        h1 {
            font-size: 35px;
        }

        .box {
            background: #222;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
        }

        .services {
            display: grid;
            gap: 15px;
        }

        .service {
            background: #333;
            padding: 15px;
            border-radius: 10px;
        }

        footer {
            background: #0066ff;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>التقني لخدمات السيارات</h1>
    <p>خدمات برمجة وفحص السيارات في الموصل</p>
</header>

<div class="box">
    <h2>خدماتنا</h2>

    <div class="services">
        <div class="service">فحص وبرمجة السيارات</div>
        <div class="service">برمجة الحساسات</div>
        <div class="service">تبديل الزيوت والفلاتر</div>
        <div class="service">خدمات الإطارات</div>
    </div>
</div>

<footer>
    الموصل - التقني لخدمات السيارات
</footer>

</body>
</html>
